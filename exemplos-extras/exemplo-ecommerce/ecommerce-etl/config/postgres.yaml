# PostgreSQL Configuration for ETL Project

database:
  name: your_database_name
  user: your_username
  password: your_password
  host: localhost
  port: 5432

# Connection pool settings
pool:
  max_size: 10
  min_size: 1
  timeout: 30

# Logging settings
logging:
  level: INFO
  file: postgres_etl.log